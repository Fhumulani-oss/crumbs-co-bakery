<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crumbs & Co Bakery | Products</title>

    <meta name="description" content="Browse our selction of cakes, breads, pastries and cupcakes.">

    <meta name="keywords" content="cakes, bread, pastries, cupcakes, bakery products">

    <!--External CSS-->

</head>

<body>

    <header>
        <h1>Crumbs & Co Bakery</h1>
        <nav>
            <a href="home.html">Home</a>

    <main class="fade-in">

        <div class="product">
        <h3>Cakes</h3>
        <p>Birthday cakes, wedding cakes, and custom designs.</p>
        <img src="images/cake.jpg" alt="Chocolate Cake" class="gallery-img" width="100">
        </div>

        <div class="product">
        <h3>Bread</h3>
        <p>Fresh white bread, brown bread, and artisan loaves.</p>
        <img src="images/Bread.jpg" alt="Fresh Bread" class="gallery-img" width="100">
        </div>

        <div class="product">
        <h3>Pastries</h3>
        <p>Croissants, muffin, and sweet treats.</p>
        <img src="images/pastries.jpg" alt="Pastries" class="gallery-img" width="200">
        <img src="images/cupcakes.jpg" alt="Cupcakes" class="gallery-img" width="200">

        </div>

    <div id="lightbox">
        <img id="lightbox-img">

    <footer>
