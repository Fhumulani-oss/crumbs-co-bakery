<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta names="viewport" content="width=device-width, initial-scale=1.0">
        <title>Crumbs & Co Bakery | Enquiries</title>

        <meta name="description" content="Request information about custom cakes, orders and bakery products.">

        <meta name="keywords" content="cake enquiries, bakery orders, custom cakes">
        <!--External CSS-->
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

        <header>
            <h1>Crumbs & Co Bakery</h1>
            <nav>
                <a href="home.html">Home</a>
                <a href="about.html">About</a>
                <a href="products.html">Products</a>
                <a href="enquiry.html">Enquiry</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>

        <main class="fade-in">
            <h2>Make an enquiry</h2>
        
            <form id="enquiryForm">

                <input type="text"
                id="name"
                placeholder="Full Name"
                required>

                <input type="email"
                id="Email"
                plaeholder="Email"
                required>

                <input type="tel"
                id="phone"
                placeholder="Phone Number"
                required>

                <select id="product">
                    <option value="">Select Product</option>
                    <option>Cake</option>
                    <option>Pastries</option>
                    <option>Bread</option>
                </select>

                <input type="number"
                id="quantity"
                placeholder="quantity">

                <button type="submit">
                    Submit
                </button>

            </form>

            <p id="result"></p>
        </main>

        <footer>
            <p>&copy; 2026 Crumbs & Co Bakery</p>
        </footer>

        <script src="js/script.js"></script>
    </body>
</html>
